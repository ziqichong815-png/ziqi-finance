<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>记录 — ZIQI CHONG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Helvetica Neue',sans-serif;background:#F7F7F4;color:#111;min-height:100vh;padding-bottom:40px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0}
.brand{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:#888}
.nav-link{font-size:12px;color:#888;text-decoration:none;border-bottom:0.5px solid #ccc;padding-bottom:1px}
.type-toggle{display:grid;grid-template-columns:repeat(3,1fr);margin:20px 16px 0;border:0.5px solid #ddd;border-radius:12px;overflow:hidden;background:#fff}
.type-btn{padding:12px 0;font-size:13px;font-weight:500;text-align:center;border:none;background:transparent;color:#888;cursor:pointer;transition:background 0.15s,color 0.15s}
.type-btn.active{background:#111;color:#fff}
.type-btn.active-inc{background:#2D6A4F;color:#fff}
.type-btn.active-debt{background:#8B1A1A;color:#fff}
.amount-section{text-align:center;padding:28px 20px 16px}
.amount-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:12px}
.amount-display{font-size:56px;font-weight:500;color:#111;letter-spacing:-2px;line-height:1}
.amount-currency{font-size:22px;color:#999;vertical-align:top;margin-top:12px;display:inline-block;margin-right:2px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e8e8e5;margin:0 16px;border-radius:12px;overflow:hidden}
.key{padding:18px 0;font-size:22px;font-weight:400;text-align:center;background:#fff;border:none;cursor:pointer;color:#111;transition:background 0.1s}
.key:active{background:#f0f0ed}
.key-muted{font-size:16px;color:#999}
.section{margin:20px 16px 0}
.field-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:10px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-btn{padding:10px 4px;font-size:11px;text-align:center;border:0.5px solid #ddd;border-radius:10px;background:#fff;color:#555;cursor:pointer;transition:all 0.15s;line-height:1.4}
.cat-btn
