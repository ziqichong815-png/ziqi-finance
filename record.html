<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>记录 · ZIQI CHONG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F5F0;font-family:-apple-system,'PingFang SC',sans-serif;min-height:100vh}

.topbar{display:flex;justify-content:space-between;align-items:center;padding:calc(14px + env(safe-area-inset-top)) 20px 12px;background:#F5F5F0}
.topbar-name{font-size:13px;font-weight:600;color:#111;letter-spacing:0.05em}
.topbar-link{font-size:12px;color:#AAA;text-decoration:none}
.topbar-link:hover{color:#111}

.tab-bar{display:flex;margin:0 20px 0;background:#EBEBEB;border-radius:14px;padding:4px;gap:4px}
.tab{flex:1;text-align:center;padding:10px 0;border-radius:10px;font-size:14px;font-weight:500;color:#999;cursor:pointer;transition:all .2s;border:none;background:transparent}
.tab.active{background:#fff;color:#111;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.tab.active.expense{background:#111;color:#fff}
.tab.active.income{background:#1B5E3B;color:#fff}
.tab.active.debt{background:#7B2D2D;color:#fff}

.amount-section{text-align:center;padding:24px 20px 16px}
.amount-label{font-size:11px;color:#AAA;letter-spacing:0.08em;margin-bottom:8px}
.amount-display{display:flex;align-items:baseline;justify-content:center;gap:8px}
.amount-currency{font-size:20px;color:#CCC;font-weight:400}
.amount-value{font-size:52px;font-weight:700;color:#111;letter-spacing:-2px;min-width:60px}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid #EBEBEB;border-left:1px solid #EBEBEB}
.key{border-right:1px solid #EBEBEB;border-bottom:1px solid #EBEBEB;padding:18px 0;text-align:center;font-size:22px;font-weight:400;color:#111;cursor:pointer;background:#fff;transition:background .1s;user-select:none}
.key:active{background:#F0F0EE}
.key.del{font-size:18px;color:#888}

.form-area{padding:16px 20px;display:flex;flex-direction:column;gap:14px}

.field-label{font-size:11px;color:#AAA;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}

.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-card{background:#fff;border:1.5px solid #EBEBEB;border-radius:14px;padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .15s}
.cat-card:active{transform:scale(0.97)}
.cat-card.selected{border-color:#111;background:#111}
.cat-card.selected .cat-icon{filter:none}
.cat-card.selected .cat-name{color:#fff}
.cat-card.selected-income{border-color:#1B5E3B;background:#1B5E3B}
.cat-card.selected-income .cat-name{color:#fff}
.cat-card.selected-debt{border-color:#7B2D2D;background:#7B2D2D}
.cat-card.selected-debt .cat-name{color:#fff}
.cat-icon{font-size:22px;line-height:1}
.cat-name{font-size:10px;color:#666;text-align:center;line-height:1.3;font-weight:500}
.cat-sub{font-size:9px;color:#AAA;text-align:center;margin-top:1px}

.date-chips{display:flex;gap:8px}
.date-chip{background:#fff;border:1.5px solid #EBEBEB;border-radius:20px;padding:8px 14px;font-size:13px;color:#888;cursor:pointer;white-space:nowrap;transition:all .15s}
.date-chip.selected{border-color:#111;color:#111;font-weight:500}
.date-custom{flex:1;min-width:0}
.date-custom input{width:100%;border:1.5px solid #EBEBEB;border-radius:20px;padding:8px 14px;font-size:13px;color:#111;background:#fff;outline:none}
.date-custom input:focus{border-color:#111}

.desc-input{width:100%;border:1.5px solid #EBEBEB;border-radius:14px;padding:12px 16px;font-size:14px;color:#111;background:#fff;outline:none;font-family:inherit}
.desc-input:focus{border-color:#111}
.desc-input::placeholder{color:#CCC}

.submit-btn{width:100%;padding:16px;border-radius:16px;border:none;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:0.02em}
.submit-btn:active{transform:scale(0.98)}
.submit-expense{background:#111;color:#fff}
.submit-income{background:#1B5E3B;color:#fff}
.submit-debt{background:#7B2D2D;color:#fff}
.submit-btn:disabled{opacity:0.4;cursor:default}

.toast{position:fixed;top:env(safe-area-inset-top,20px);left:50%;transform:translateX(-50%) translateY(-80px);background:#111;color:#fff;padding:12px 24px;border-radius:20px;font-size:14px;font-weight:500;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(20px)}

.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #EBEBEB;display:flex;padding:10px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#CCC;text-decoration:none}
.nav-item.active{color:#111}
.nav-icon{font-size:20px}

.content{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-name">ZIQI CHONG</div>
  <a href="/dashboard.html" class="topbar-link">查看报告 →</a>
</div>

<div class="tab-bar">
  <button class="tab active expense" onclick="switchTab('expense')">支出</button>
  <button class="tab income" onclick="switchTab('income')">收入</button>
  <button class="tab debt" onclick="switchTab('debt')">还债</button>
</div>

<div class="content">
  <div class="amount-section">
    <div class="amount-label">金额</div>
    <div class="amount-display">
      <span class="amount-currency">RM</span>
      <span class="amount-value" id="amountDisplay">0</span>
    </div>
  </div>

  <div class="keypad">
    <div class="key" onclick="keyPress('1')">1</div>
    <div class="key" onclick="keyPress('2')">2</div>
    <div class="key" onclick="keyPress('3')">3</div>
    <div class="key" onclick="keyPress('4')">4</div>
    <div class="key" onclick="keyPress('5')">5</div>
    <div class="key" onclick="keyPress('6')">6</div>
    <div class="key" onclick="keyPress('7')">7</div>
    <div class="key" onclick="keyPress('8')">8</div>
    <div class="key" onclick="keyPress('9')">9</div>
    <div class="key" onclick="keyPress('.')">.</div>
    <div class="key" onclick="keyPress('0')">0</div>
    <div class="key del" onclick="keyPress('del')">⌫</div>
  </div>

  <div class="form-area">

    <!-- 支出分类 -->
    <div id="expenseCats">
      <div class="field-label">分类</div>
      <div class="cat-grid" id="catGrid">
        <div class="loading-state" style="grid-column:1/-1;color:#CCC;font-size:12px;padding:12px 0">加载分类...</div>
      </div>
    </div>

    <!-- 收入类型 -->
    <div id="incomeTypes" style="display:none">
      <div class="field-label">收入类型</div>
      <div class="cat-grid">
        <div class="cat-card" onclick="selectType(this,'正职收入','income')">
          <div class="cat-icon">💼</div>
          <div class="cat-name">正职收入</div>
        </div>
        <div class="cat-card" onclick="selectType(this,'副业收入','income')">
          <div class="cat-icon">💡</div>
          <div class="cat-name">副业收入</div>
        </div>
        <div class="cat-card" onclick="selectType(this,'投资收益','income')">
          <div class="cat-icon">📈</div>
          <div class="cat-name">投资收益</div>
        </div>
        <div class="cat-card" onclick="selectType(this,'其他收入','income')">
          <div class="cat-icon">🎁</div>
          <div class="cat-name">其他收入</div>
        </div>
      </div>
    </div>

    <!-- 还债账户 -->
    <div id="debtAccounts" style="display:none">
      <div class="field-label">还哪一笔债</div>
      <div class="cat-grid" id="debtGrid">
        <div style="grid-column:1/-1;color:#CCC;font-size:12px;padding:12px 0">加载中...</div>
      </div>
    </div>

    <!-- 描述 -->
    <div>
      <div class="field-label">描述</div>
      <input class="desc-input" id="descInput" placeholder="输入描述（可选）" type="text">
    </div>

    <!-- 日期 -->
    <div>
      <div class="field-label">日期</div>
      <div class="date-chips">
        <div class="date-chip selected" id="chip-today" onclick="selectDate('today')">今天</div>
        <div class="date-chip" id="chip-yesterday" onclick="selectDate('yesterday')">昨天</div>
        <div class="date-custom">
          <input type="date" id="customDate" onchange="selectDate('custom')">
        </div>
      </div>
    </div>

    <button class="submit-btn submit-expense" id="submitBtn" onclick="submit()">记录支出</button>
  </div>
</div>

<div class="bottomnav">
  <a href="/record.html" class="nav-item active">
    <div class="nav-icon">✏️</div>
    <div>记录</div>
  </a>
  <a href="/dashboard.html" class="nav-item">
    <div class="nav-icon">📊</div>
    <div>报告</div>
  </a>
</div>

<div class="toast" id="toast"></div>

<script>
let amount = '';
let selectedCatId = null;
let selectedCatName = '';
let selectedIncomeType = '';
let selectedDebtId = null;
let selectedDebtName = '';
let selectedDate = 'today';
let currentTab = 'expense';

const debtIcons = {
  'cimb': '🏦', 'uob': '🏧', 'hsbc': '💳', 'maybank': '🏦',
  'friend': '👥', 'family': '👨‍👩‍👧', 'personal': '🤝'
};

function getDebtIcon(name) {
  const lower = name.toLowerCase();
  for (const [k, v] of Object.entries(debtIcons)) {
    if (lower.includes(k)) return v;
  }
  return '💳';
}

const catIcons = {
  '订阅': '📱', 'subscription': '📱',
  '其他': '📦', 'others': '📦',
  '娱乐': '🎉', 'entertainment': '🎉',
  '交通': '🚗', 'transport': '🚗',
  '生活': '🛒', 'life': '🛒', 'living': '🏠',
  '住宿': '🏠',
  '饮食': '🍜', 'food': '🍜', 'beverage': '🍜',
};
function getCatIcon(name) {
  const lower = name.toLowerCase();
  for (const [k, v] of Object.entries(catIcons)) {
    if (lower.includes(k)) return v;
  }
  return '💰';
}

async function loadCategories() {
  const res = await fetch('/api/notion?action=categories');
  const cats = await res.json();
  const grid = document.getElementById('catGrid');
  grid.innerHTML = cats.map(c => `
    <div class="cat-card" onclick="selectCat(this,'${c.id}','${c.name.replace(/'/g,"\\'")}')">
      <div class="cat-icon">${getCatIcon(c.name)}</div>
      <div class="cat-name">${c.name}</div>
    </div>`).join('');
}

async function loadDebtAccounts() {
  const res = await fetch('/api/notion?action=debt-accounts');
  const accounts = await res.json();
  const grid = document.getElementById('debtGrid');
  grid.innerHTML = accounts.map(a => `
    <div class="cat-card" onclick="selectDebt(this,'${a.id}','${a.name.replace(/'/g,"\\'")}')">
      <div class="cat-icon">${getDebtIcon(a.name)}</div>
      <div class="cat-name">${a.name}</div>
      <div class="cat-sub">剩 RM ${Math.round(a.remaining).toLocaleString()}</div>
    </div>`).join('');
}

function selectCat(el, id, name) {
  document.querySelectorAll('#catGrid .cat-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCatId = id;
  selectedCatName = name;
}

function selectType(el, name, type) {
  const grid = el.closest('.cat-grid');
  grid.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected-income','selected-debt','selected'));
  el.classList.add(type === 'income' ? 'selected-income' : 'selected-debt');
  selectedIncomeType = name;
}

function selectDebt(el, id, name) {
  document.querySelectorAll('#debtGrid .cat-card').forEach(c => c.classList.remove('selected-debt'));
  el.classList.add('selected-debt');
  selectedDebtId = id;
  selectedDebtName = name;
}

function switchTab(tab) {
  currentTab = tab;
  selectedCatId = null; selectedIncomeType = ''; selectedDebtId = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  document.getElementById('expenseCats').style.display = tab === 'expense' ? 'block' : 'none';
  document.getElementById('incomeTypes').style.display = tab === 'income' ? 'block' : 'none';
  document.getElementById('debtAccounts').style.display = tab === 'debt' ? 'block' : 'none';

  const btn = document.getElementById('submitBtn');
  btn.className = `submit-btn submit-${tab}`;
  btn.textContent = tab === 'expense' ? '记录支出' : tab === 'income' ? '记录收入' : '记录还款';
}

function keyPress(k) {
  if (k === 'del') { amount = amount.slice(0, -1); }
  else if (k === '.' && amount.includes('.')) { return; }
  else if (amount === '0' && k !== '.') { amount = k; }
  else { if (amount.includes('.') && amount.split('.')[1].length >= 2) return; amount += k; }
  if (!amount) amount = '';
  document.getElementById('amountDisplay').textContent = amount || '0';
}

function selectDate(type) {
  selectedDate = type;
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('selected'));
  if (type !== 'custom') document.getElementById('chip-' + type).classList.add('selected');
}

function getDateStr() {
  const now = new Date();
  if (selectedDate === 'yesterday') { now.setDate(now.getDate() - 1); }
  else if (selectedDate === 'custom') { return document.getElementById('customDate').value; }
  return now.toISOString().split('T')[0];
}

function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#111' : '#C0392B';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function submit() {
  const amtVal = parseFloat(amount);
  if (!amtVal || amtVal <= 0) { showToast('请先输入金额', false); return; }
  const dateStr = getDateStr();
  if (!dateStr) { showToast('请选择日期', false); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '记录中...';

  try {
    const desc = document.getElementById('descInput').value.trim();
    let body, action;

    if (currentTab === 'expense') {
      action = 'add-expense';
      body = { name: desc || selectedCatName || '支出', amount: amtVal, categoryId: selectedCatId, date: dateStr };
    } else if (currentTab === 'income') {
      if (!selectedIncomeType) { showToast('请选择收入类型', false); btn.disabled = false; btn.textContent = '记录收入'; return; }
      action = 'add-income';
      body = { name: desc || selectedIncomeType, amount: amtVal, category: selectedIncomeType, date: dateStr };
    } else {
      if (!selectedDebtId) { showToast('请选择债务账户', false); btn.disabled = false; btn.textContent = '记录还款'; return; }
      action = 'add-expense';
      body = { name: desc || `还款 · ${selectedDebtName}`, amount: amtVal, date: dateStr };
    }

    const res = await fetch(`/api/notion?action=${action}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      showToast('✓ 已记录！');
      amount = '';
      document.getElementById('amountDisplay').textContent = '0';
      document.getElementById('descInput').value = '';
    } else { showToast('记录失败，请重试', false); }
  } catch(e) { showToast('网络错误', false); }

  btn.disabled = false;
  btn.textContent = currentTab === 'expense' ? '记录支出' : currentTab === 'income' ? '记录收入' : '记录还款';
}

// 初始化
const today = new Date().toISOString().split('T')[0];
document.getElementById('customDate').value = today;
loadCategories();
loadDebtAccounts();
</script>
</body>
</html>
