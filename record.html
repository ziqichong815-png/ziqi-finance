<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>记录 — ZIQI CHONG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Helvetica Neue',sans-serif;background:#F7F7F4;color:#111;min-height:100vh;padding-bottom:40px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 0}
.brand{font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:#888}
.nav-link{font-size:12px;color:#888;text-decoration:none;border-bottom:0.5px solid #ccc;padding-bottom:1px}
.type-toggle{display:grid;grid-template-columns:repeat(3,1fr);margin:20px 16px 0;border:0.5px solid #ddd;border-radius:12px;overflow:hidden;background:#fff}
.type-btn{padding:12px 0;font-size:13px;font-weight:500;text-align:center;border:none;background:transparent;color:#888;cursor:pointer}
.type-btn.active{background:#111;color:#fff}
.type-btn.active-inc{background:#2D6A4F;color:#fff}
.type-btn.active-debt{background:#8B1A1A;color:#fff}
.amount-section{text-align:center;padding:28px 20px 16px}
.amount-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:12px}
.amount-display{font-size:56px;font-weight:500;color:#111;letter-spacing:-2px;line-height:1}
.amount-currency{font-size:22px;color:#999;vertical-align:top;margin-top:12px;display:inline-block;margin-right:2px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e8e8e5;margin:0 16px;border-radius:12px;overflow:hidden}
.key{padding:18px 0;font-size:22px;font-weight:400;text-align:center;background:#fff;border:none;cursor:pointer;color:#111}
.key:active{background:#f0f0ed}
.key-muted{font-size:16px;color:#999}
.section{margin:20px 16px 0}
.field-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:10px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-btn{padding:10px 4px;font-size:11px;text-align:center;border:0.5px solid #ddd;border-radius:10px;background:#fff;color:#555;cursor:pointer;line-height:1.4}
.cat-btn .icon{font-size:18px;display:block;margin-bottom:3px}
.cat-btn.selected{background:#111;color:#fff;border-color:#111}
.date-row{display:flex;gap:8px}
.date-chip{padding:9px 18px;font-size:13px;border:0.5px solid #ddd;border-radius:20px;background:#fff;color:#555;cursor:pointer}
.date-chip.selected{background:#111;color:#fff;border-color:#111}
.date-input{padding:9px 14px;font-size:13px;border:0.5px solid #ddd;border-radius:20px;background:#fff;color:#555;outline:none;font-family:inherit}
.note-input{width:100%;padding:12px 14px;font-size:14px;font-family:inherit;border:0.5px solid #ddd;border-radius:12px;background:#fff;color:#111;outline:none;resize:none}
.note-input::placeholder{color:#bbb}
.income-cats{display:flex;flex-direction:column;gap:8px}
.income-cat-btn{padding:12px 16px;font-size:13px;border:0.5px solid #ddd;border-radius:10px;background:#fff;color:#555;cursor:pointer;text-align:left}
.income-cat-btn.selected{background:#2D6A4F;color:#fff;border-color:#2D6A4F}
.debt-accounts{display:flex;flex-direction:column;gap:8px}
.debt-btn{padding:12px 16px;border:0.5px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;text-align:left}
.debt-btn.selected{background:#8B1A1A;color:#fff;border-color:#8B1A1A}
.debt-name{font-size:13px;font-weight:500}
.debt-remaining{font-size:11px;color:#999;margin-top:2px}
.debt-btn.selected .debt-remaining{color:rgba(255,255,255,0.7)}
.submit-btn{width:calc(100% - 32px);margin:20px 16px 0;padding:16px;font-size:15px;font-weight:500;background:#111;color:#fff;border:none;border-radius:14px;cursor:pointer}
.submit-btn.inc-btn{background:#2D6A4F}
.submit-btn.debt-btn-submit{background:#8B1A1A}
.divider{margin:28px 16px 0;border:none;border-top:0.5px solid #e0e0dc}
.recent-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin:20px 16px 12px}
.recent-list{margin:0 16px}
.recent-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:0.5px solid #e8e8e5}
.recent-item:last-child{border-bottom:none}
.ri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:2px}
.ri-exp{background:#111}
.ri-inc{background:#2D6A4F}
.ri-left{display:flex;align-items:flex-start;gap:10px}
.ri-name{font-size:13px;color:#111}
.ri-cat{font-size:11px;color:#999;margin-top:2px}
.ri-amount{font-size:13px;font-weight:500;color:#111}
.ri-date{font-size:11px;color:#999;margin-top:2px;text-align:right}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 24px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}
.loading{color:#999;font-size:13px;text-align:center;padding:16px}
</style>
</head>
<body>
<div class="header">
  <div class="brand">ZIQI CHONG</div>
  <a href="/dashboard.html" class="nav-link">查看报告 →</a>
</div>
<div class="type-toggle">
  <button class="type-btn active" onclick="setType('expense')">支出</button>
  <button class="type-btn" onclick="setType('income')">收入</button>
  <button class="type-btn" onclick="setType('debt')">还债</button>
</div>
<div class="amount-section">
  <div class="amount-label">金额</div>
  <div class="amount-display"><span class="amount-currency">RM</span><span id="amount-display">0</span></div>
</div>
<div class="keypad">
  <button class="key" onclick="keyPress('1')">1</button>
  <button class="key" onclick="keyPress('2')">2</button>
  <button class="key" onclick="keyPress('3')">3</button>
  <button class="key" onclick="keyPress('4')">4</button>
  <button class="key" onclick="keyPress('5')">5</button>
  <button class="key" onclick="keyPress('6')">6</button>
  <button class="key" onclick="keyPress('7')">7</button>
  <button class="key" onclick="keyPress('8')">8</button>
  <button class="key" onclick="keyPress('9')">9</button>
  <button class="key key-muted" onclick="keyPress('.')">.</button>
  <button class="key" onclick="keyPress('0')">0</button>
  <button class="key key-muted" onclick="keyPress('del')">⌫</button>
</div>
<div class="section" id="section-category">
  <div class="field-label">分类</div>
  <div class="cat-grid" id="cat-grid"><div class="loading">载入中...</div></div>
</div>
<div class="section" id="section-income-cat" style="display:none">
  <div class="field-label">收入类型</div>
  <div class="income-cats">
    <button class="income-cat-btn selected" onclick="selectIncomecat(this,'正职 / 不是中藥')">正职收入</button>
    <button class="income-cat-btn" onclick="selectIncomecat(this,'副业 / 行销日志')">副业收入</button>
    <button class="income-cat-btn" onclick="selectIncomecat(this,'其他 / 额外收入')">其他收入</button>
  </div>
</div>
<div class="section" id="section-debt-accounts" style="display:none">
  <div class="field-label">还哪一笔债</div>
  <div class="debt-accounts" id="debt-accounts"><div class="loading">载入中...</div></div>
</div>
<div class="section">
  <div class="field-label">日期</div>
  <div class="date-row">
    <div class="date-chip selected" onclick="selectDate(this,'today')">今天</div>
    <div class="date-chip" onclick="selectDate(this,'yesterday')">昨天</div>
    <input type="date" class="date-input" id="custom-date" onchange="selectCustomDate(this)">
  </div>
</div>
<div class="section">
  <div class="field-label">备注（可选）</div>
  <textarea class="note-input" id="note" rows="2" placeholder="例：和朋友吃午餐"></textarea>
</div>
<button class="submit-btn" id="submit-btn" onclick="submitRecord()">记录支出</button>
<hr class="divider">
<div class="recent-label">最近记录</div>
<div class="recent-list" id="recent-list"><div class="loading">载入中...</div></div>
<div class="toast" id="toast"></div>
<script>
let currentType='expense',amountStr='0',selectedCategoryId=null,selectedIncomeCategory='正职 / 不是中藥',selectedDebtId=null,selectedDate='today';
function getToday(){return new Date().toISOString().split('T')[0]}
function getYesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0]}
function getSelectedDate(){if(selectedDate==='today')return getToday();if(selectedDate==='yesterday')return getYesterday();return document.getElementById('custom-date').value||getToday()}
function keyPress(k){if(k==='del'){amountStr=amountStr.length>1?amountStr.slice(0,-1):'0'}else if(k==='.'){if(!amountStr.includes('.'))amountStr+='.'}else{if(amountStr==='0')amountStr=k;else if(amountStr.includes('.')&&amountStr.split('.')[1].length>=2)return;else amountStr+=k}document.getElementById('amount-display').textContent=amountStr;updateSubmitBtn()}
function setType(type){currentType=type;document.querySelectorAll('.type-btn').forEach(b=>b.className='type-btn');const btns=document.querySelectorAll('.type-btn');if(type==='expense')btns[0].className='type-btn active';if(type==='income')btns[1].className='type-btn active-inc';if(type==='debt')btns[2].className='type-btn active-debt';document.getElementById('section-category').style.display=type==='expense'?'':'none';document.getElementById('section-income-cat').style.display=type==='income'?'':'none';document.getElementById('section-debt-accounts').style.display=type==='debt'?'':'none';updateSubmitBtn()}
function updateSubmitBtn(){const btn=document.getElementById('submit-btn');const amt=parseFloat(amountStr)||0;if(currentType==='expense'){btn.className='submit-btn';btn.textContent=amt>0?`记录支出 RM ${parseFloat(amountStr).toFixed(2)}`:'记录支出'}else if(currentType==='income'){btn.className='submit-btn inc-btn';btn.textContent=amt>0?`记录收入 RM ${parseFloat(amountStr).toFixed(2)}`:'记录收入'}else{btn.className='submit-btn debt-btn-submit';btn.textContent=amt>0?`记录还款 RM ${parseFloat(amountStr).toFixed(2)}`:'记录还款'}}
function selectDate(el,val){document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');selectedDate=val}
function selectCustomDate(el){document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('selected'));selectedDate='custom'}
function selectIncomecat(el,val){document.querySelectorAll('.income-cat-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');selectedIncomeCategory=val}
function renderCategories(cats){const icons={'饮食':'🍜','交通':'🚗','娱乐':'🎉','购物':'🛒','医疗':'💊','进修':'📚','住家':'🏠','订阅':'💻','其他':'＋'};const grid=document.getElementById('cat-grid');grid.innerHTML='';cats.forEach((c,i)=>{const icon=Object.entries(icons).find(([k])=>c.name.includes(k))?.[1]||'📌';const btn=document.createElement('div');btn.className='cat-btn'+(i===0?' selected':'');btn.innerHTML=`<span class="icon">${icon}</span>${c.name}`;btn.onclick=()=>{document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedCategoryId=c.id};if(i===0)selectedCategoryId=c.id;grid.appendChild(btn)})}
function renderDebtAccounts(accounts){const container=document.getElementById('debt-accounts');container.innerHTML='';accounts.forEach((a,i)=>{const btn=document.createElement('div');btn.className='debt-btn'+(i===0?' selected':'');btn.innerHTML=`<div class="debt-name">${a.name}</div><div class="debt-remaining">剩余 RM ${a.remaining.toLocaleString()}</div>`;btn.onclick=()=>{document.querySelectorAll('.debt-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedDebtId=a.id};if(i===0)selectedDebtId=a.id;container.appendChild(btn)})}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
async function submitRecord(){const amount=parseFloat(amountStr);if(!amount||amount<=0){showToast('请输入金额');return}const note=document.getElementById('note').value.trim();const date=getSelectedDate();const btn=document.getElementById('submit-btn');btn.textContent='处理中...';btn.disabled=true;try{if(currentType==='expense'){await fetch('/api/notion?action=add-expense',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:note||'支出',amount,categoryId:selectedCategoryId,date})})}else if(currentType==='income'){await fetch('/api/notion?action=add-income',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:note||'收入',amount,category:selectedIncomeCategory,date,remarks:note})})}showToast(currentType==='expense'?'支出已记录 ✓':'收入已记录 ✓');amountStr='0';document.getElementById('amount-display').textContent='0';document.getElementById('note').value='';updateSubmitBtn();loadRecent()}catch(e){showToast('记录失败，请重试')}finally{btn.disabled=false;updateSubmitBtn()}}
async function loadRecent(){try{const res=await fetch('/api/notion?action=dashboard');const data=await res.json();const list=document.getElementById('recent-list');if(!data.recentExpenses?.length){list.innerHTML='<div class="loading">暂无记录</div>';return}list.innerHTML=data.recentExpenses.map(e=>`<div class="recent-item"><div class="ri-left"><div class="ri-dot ri-exp"></div><div><div class="ri-name">${e.name||'支出'}</div><div class="ri-cat">${e.category||''}</div></div></div><div><div class="ri-amount">-RM ${e.amount.toFixed(2)}</div><div class="ri-date">${e.date}</div></div></div>`).join('')}catch(e){}}
async function init(){try{const[catsRes,debtRes]=await Promise.all([fetch('/api/notion?action=categories'),fetch('/api/notion?action=debt-accounts')]);const cats=await catsRes.json();const debts=await debtRes.json();renderCategories(cats);renderDebtAccounts(debts)}catch(e){document.getElementById('cat-grid').innerHTML='<div class="loading">无法载入分类</div>'}loadRecent()}
init();
</script>
</body>
</html>
