<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>财务报告 · ZIQI CHONG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#EEEEE9;font-family:-apple-system,'PingFang SC',sans-serif;min-height:100vh}
.safe-wrap{max-width:480px;margin:0 auto;min-height:100vh;background:#F5F5F0;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.topbar{padding:calc(14px + env(safe-area-inset-top)) 20px 12px;display:flex;justify-content:space-between;align-items:center;background:#F5F5F0}
.topbar-name{font-size:13px;font-weight:600;color:#111;letter-spacing:0.05em}
.topbar-sub{font-size:11px;color:#999;margin-top:2px}
.notif{width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #E8E8E8;font-size:16px}

/* Health Score */
.health-card{margin:0 20px 16px;background:#111;border-radius:24px;padding:20px;color:#fff;position:relative;overflow:hidden}
.health-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(197,169,106,0.1);border-radius:50%}
.health-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.score-circle{width:72px;height:72px;position:relative;flex-shrink:0}
.score-circle svg{transform:rotate(-90deg)}
.score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-big{font-size:20px;font-weight:700;color:#F0F0F0;line-height:1}
.score-label{font-size:9px;color:#666;margin-top:2px}
.health-right{flex:1}
.health-title{font-size:15px;font-weight:600;color:#F0F0F0;margin-bottom:4px}
.health-desc{font-size:12px;color:#666;line-height:1.4}
.health-bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.hbar-item{text-align:center}
.hbar-label{font-size:10px;color:#666;margin-bottom:4px}
.hbar-track{height:4px;background:#1E1E1E;border-radius:2px;overflow:hidden;margin-bottom:4px}
.hbar-fill{height:100%;border-radius:2px}
.hbar-val{font-size:11px;font-weight:600}

/* Month nav */
.hero-card{margin:0 20px 0;background:#1A1A1A;border-radius:20px;padding:18px}
.hero-month-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.mnav-btn{background:#222;border:1px solid #2A2A2A;color:#666;width:28px;height:28px;border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mnav-btn:hover{border-color:#C5A96A;color:#C5A96A}
.hero-month-label{font-size:14px;font-weight:600;color:#F0F0F0;flex:1}
.yr-btns{display:flex;gap:6px}
.yr-btn{background:#222;border:1px solid #2A2A2A;color:#666;padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer}
.yr-btn.active{border-color:#C5A96A;color:#C5A96A}
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.kpi{background:#222;border-radius:12px;padding:12px}
.kpi-label{font-size:10px;color:#666;margin-bottom:4px}
.kpi-val{font-size:16px;font-weight:700;color:#F0F0F0}
.kpi-val.gold{color:#C5A96A}
.kpi-val.green{color:#52C17A}
.kpi-val.red{color:#E05C5C}

.section{padding:16px 20px 0}
.sec-title{font-size:11px;font-weight:600;color:#AAA;letter-spacing:0.10em;text-transform:uppercase;margin-bottom:12px}

/* Alerts */
.alert-card{background:#fff;border-radius:16px;padding:13px 15px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;border-left:3px solid #E05C5C}
.alert-card.warn{border-left-color:#E0A550}
.alert-card.tip{border-left-color:#52C17A}
.alert-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.alert-icon.red{background:#FEEEEE}
.alert-icon.warn{background:#FEF5E7}
.alert-icon.green{background:#EEF9F2}
.alert-title{font-size:13px;font-weight:600;color:#111;margin-bottom:2px}
.alert-body{font-size:12px;color:#888;line-height:1.5}

/* Charts */
.chart-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:0}
.chart-inner{position:relative;width:100%;height:160px}
.chart-inner.tall{height:180px}
.chart-inner.donut{height:200px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#888}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* Budget */
.budget-card{background:#fff;border-radius:16px;padding:13px 15px;margin-bottom:8px}
.budget-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.budget-name{font-size:13px;font-weight:600;color:#111}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-ok{background:#EEF9F2;color:#2D9B5A}
.badge-warn{background:#FEF5E7;color:#B8760A}
.badge-over{background:#FEEEEE;color:#C0392B}
.budget-amounts{font-size:12px;color:#AAA;margin-bottom:7px}
.budget-amounts b{color:#111;font-size:13px}
.btrack{height:5px;background:#F0F0EE;border-radius:3px;overflow:hidden;margin-bottom:5px}
.bfill{height:100%;border-radius:3px}
.bfill.ok{background:#52C17A}
.bfill.warn{background:#E0A550}
.bfill.over{background:#E05C5C}
.budget-remain{font-size:11px;color:#BBB}
.budget-remain b{color:#555}

/* Debt */
.debt-card{background:#fff;border-radius:16px;padding:13px 15px;margin-bottom:8px}
.debt-name{font-size:13px;font-weight:600;color:#111;margin-bottom:8px}
.debt-row{display:flex;justify-content:space-between;font-size:12px;color:#AAA;margin-bottom:4px}
.debt-row span{color:#555;font-weight:500}
.debt-predict{font-size:11px;color:#C5A96A;margin-top:6px}
.dtrack{height:4px;background:#F0F0EE;border-radius:2px;margin-top:8px;overflow:hidden}
.dfill{height:100%;border-radius:2px;background:#C5A96A}

/* Tx */
.tx-item{background:#fff;border-radius:14px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px}
.tx-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.tx-name{font-size:13px;font-weight:500;color:#111}
.tx-meta{font-size:11px;color:#BBB;margin-top:1px}
.tx-amount{font-size:13px;font-weight:600;color:#E05C5C;margin-left:auto}
.anomaly-badge{font-size:10px;background:#FEEEEE;color:#C0392B;padding:1px 6px;border-radius:6px;margin-left:6px}

.loading-state{color:#CCC;font-size:13px;text-align:center;padding:20px}

.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #EBEBEB;display:flex;padding:10px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#CCC;text-decoration:none}
.nav-item.active{color:#111}
.nav-icon{font-size:20px}

/* Desktop */
@media(min-width:520px){
  body{display:block;padding:0;background:#EEEEE9}
  .safe-wrap{max-width:100%;border-radius:0;box-shadow:none;background:transparent;display:grid;grid-template-columns:380px 1fr;grid-template-areas:'topbar topbar' 'left right' 'nav nav';min-height:100vh;padding-bottom:0}
  .topbar{grid-area:topbar;background:#fff;border-bottom:1px solid #E8E8E8;padding:14px 32px}
  .left-col{grid-area:left;padding:20px 12px 100px 24px}
  .right-col{grid-area:right;padding:20px 24px 100px 12px}
  .bottomnav{grid-area:nav;position:sticky;bottom:0;max-width:100%;left:0;transform:none;border-radius:0;border-top:1px solid #E8E8E8;padding:10px 32px;justify-content:flex-start;gap:32px}
  .nav-item{flex:none;flex-direction:row;gap:8px;font-size:13px}
}
</style>
</head>
<body>
<div class="safe-wrap">

<div class="topbar">
  <div><div class="topbar-name">ZIQI CHONG</div><div class="topbar-sub" id="topbarSub">加载中...</div></div>
  <div class="notif">🔔</div>
</div>

<!-- 左栏 -->
<div class="left-col">

  <!-- 财务健康评分 -->
  <div class="health-card" id="healthCard">
    <div class="health-top">
      <div class="score-circle">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r="30" fill="none" stroke="#222" stroke-width="6"/>
          <circle cx="36" cy="36" r="30" fill="none" stroke="#C5A96A" stroke-width="6" stroke-linecap="round"
            stroke-dasharray="188.5" stroke-dashoffset="188.5" id="scoreArc"/>
        </svg>
        <div class="score-num"><div class="score-big" id="scoreNum">--</div><div class="score-label">分</div></div>
      </div>
      <div class="health-right">
        <div class="health-title" id="healthTitle">计算中...</div>
        <div class="health-desc" id="healthDesc"></div>
      </div>
    </div>
    <div class="health-bars">
      <div class="hbar-item">
        <div class="hbar-label">储蓄率</div>
        <div class="hbar-track"><div class="hbar-fill" id="hb1" style="background:#52C17A;width:0%"></div></div>
        <div class="hbar-val" id="hv1" style="color:#52C17A">--%</div>
      </div>
      <div class="hbar-item">
        <div class="hbar-label">预算控制</div>
        <div class="hbar-track"><div class="hbar-fill" id="hb2" style="background:#C5A96A;width:0%"></div></div>
        <div class="hbar-val" id="hv2" style="color:#C5A96A">--%</div>
      </div>
      <div class="hbar-item">
        <div class="hbar-label">债务负担</div>
        <div class="hbar-track"><div class="hbar-fill" id="hb3" style="background:#6B9EE8;width:0%"></div></div>
        <div class="hbar-val" id="hv3" style="color:#6B9EE8">--%</div>
      </div>
    </div>
  </div>

  <!-- 月份导航 + KPI -->
  <div class="hero-card">
    <div class="hero-month-nav">
      <button class="mnav-btn" id="prevMonth">‹</button>
      <div class="hero-month-label" id="heroMonthLabel">--</div>
      <button class="mnav-btn" id="nextMonth">›</button>
      <div class="yr-btns">
        <button class="yr-btn" onclick="setYear(2025)">2025</button>
        <button class="yr-btn active" onclick="setYear(2026)">2026</button>
      </div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">收入</div><div class="kpi-val gold" id="heroIncome">--</div></div>
      <div class="kpi"><div class="kpi-label">支出</div><div class="kpi-val" id="heroExpenses">--</div></div>
      <div class="kpi"><div class="kpi-label">储蓄率</div><div class="kpi-val green" id="heroSavings">--</div></div>
    </div>
  </div>

  <!-- 智能提醒 -->
  <div id="alertSection" style="display:none;margin-top:16px">
    <div class="sec-title">智能提醒</div>
    <div id="alertList"></div>
  </div>

  <!-- 最近支出 -->
  <div style="margin-top:16px">
    <div class="sec-title">最近支出</div>
    <div id="recentList"><div class="loading-state">加载中...</div></div>
  </div>

</div>

<!-- 右栏 -->
<div class="right-col">

  <!-- 收入 vs 支出 -->
  <div style="margin-bottom:16px">
    <div class="sec-title">收入 vs 支出（全年）</div>
    <div class="chart-card">
      <div class="chart-inner tall"><canvas id="incExpChart" role="img" aria-label="Income vs expenses by month">Loading...</canvas></div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:#C5A96A"></div>收入</div>
        <div class="leg-item"><div class="leg-dot" style="background:#333"></div>支出</div>
      </div>
    </div>
  </div>

  <!-- 每日支出 -->
  <div style="margin-bottom:16px">
    <div class="sec-title" id="dailyTitle">本月每日支出</div>
    <div class="chart-card">
      <div class="chart-inner"><canvas id="dailyChart" role="img" aria-label="Daily spending">Loading...</canvas></div>
    </div>
  </div>

  <!-- 支出分类饼图 -->
  <div style="margin-bottom:16px">
    <div class="sec-title">本月支出分类</div>
    <div class="chart-card" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <div style="position:relative;width:140px;height:140px;flex-shrink:0;margin:0 auto">
        <canvas id="donutChart" role="img" aria-label="Spending by category">Loading...</canvas>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">
          <div style="font-size:10px;color:#AAA">总支出</div>
          <div style="font-size:14px;font-weight:700;color:#111" id="donutTotal">--</div>
        </div>
      </div>
      <div style="flex:1;min-width:120px" id="donutLegend"></div>
    </div>
  </div>

  <!-- 预算执行 -->
  <div style="margin-bottom:16px">
    <div class="sec-title">预算执行</div>
    <div id="budgetList"><div class="loading-state">加载中...</div></div>
  </div>

  <!-- 债务进度 + 预测 -->
  <div>
    <div class="sec-title">债务进度 & 还清预测</div>
    <div id="debtList"><div class="loading-state">加载中...</div></div>
  </div>

</div>
</div>

<div class="bottomnav">
  <a href="/record.html" class="nav-item"><div class="nav-icon">✏️</div><div>记录</div></a>
  <a href="/dashboard.html" class="nav-item active"><div class="nav-icon">📊</div><div>报告</div></a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const fmtShort = n => 'RM ' + Math.round(n||0).toLocaleString('en-MY');
const fmt2 = n => 'RM ' + (n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let charts = {};
let yearlyCache = {};

// Nav
document.getElementById('prevMonth').onclick = () => { currentMonth--; if(currentMonth<1){currentMonth=12;currentYear--;} updateYrBtns(); loadAll(); };
document.getElementById('nextMonth').onclick = () => { const n=new Date(); if(currentYear===n.getFullYear()&&currentMonth>=n.getMonth()+1)return; currentMonth++; if(currentMonth>12){currentMonth=1;currentYear++;} updateYrBtns(); loadAll(); };
function setYear(y){currentYear=y;const n=new Date();currentMonth=y===n.getFullYear()?n.getMonth()+1:12;updateYrBtns();yearlyCache={};loadAll();}
function updateYrBtns(){document.querySelectorAll('.yr-btn').forEach(b=>b.classList.toggle('active',parseInt(b.textContent)===currentYear));}

// Health Score
function calcHealth(data) {
  const sr = data.monthly.savingsRate;
  const ba = data.monthly.budgetAdherence;
  const monthlyDebt = data.debt.reduce((s,d)=>s+d.monthlyPayment,0);
  const debtRatio = data.monthly.income>0 ? (monthlyDebt/data.monthly.income)*100 : 100;

  const savScore = Math.min(40, Math.max(0, sr>=50?40:sr>=30?30:sr>=15?20:sr>=0?10:0));
  const budScore = ba<=80?30:ba<=100?20:ba<=120?10:0;
  const debtScore = debtRatio<15?30:debtRatio<25?22:debtRatio<35?14:debtRatio<50?7:0;
  const total = savScore + budScore + debtScore;

  return { total, savScore, budScore, debtScore, sr, ba, debtRatio };
}

function renderHealth(h) {
  const arc = 188.5 * (1 - h.total/100);
  document.getElementById('scoreArc').style.strokeDashoffset = arc;
  document.getElementById('scoreNum').textContent = h.total;
  const title = h.total>=80?'财务状况健康 💪':h.total>=60?'财务状况尚可 📈':h.total>=40?'需要关注 ⚠️':'财务压力较大 🚨';
  const desc = h.total>=80?'储蓄、预算、债务都在掌控中':h.total>=60?'有几个地方可以改善':h.total>=40?'支出或债务需要控制':'建议优先减少非必要支出';
  document.getElementById('healthTitle').textContent = title;
  document.getElementById('healthDesc').textContent = desc;

  const srPct = Math.min(100, Math.max(0, h.sr));
  document.getElementById('hb1').style.width = srPct+'%';
  document.getElementById('hv1').textContent = h.sr+'%';
  document.getElementById('hv1').style.color = h.sr>=20?'#52C17A':h.sr>=0?'#E0A550':'#E05C5C';

  const budPct = Math.min(100, h.budScore/30*100);
  document.getElementById('hb2').style.width = budPct+'%';
  document.getElementById('hv2').textContent = h.ba+'%';
  document.getElementById('hv2').style.color = h.ba<=100?'#C5A96A':'#E05C5C';

  const debtPct = h.debtScore/30*100;
  document.getElementById('hb3').style.width = debtPct+'%';
  document.getElementById('hv3').textContent = Math.round(h.debtRatio)+'%';
}

// Alerts
function buildAlerts(data) {
  const now=new Date();
  const daysLeft=new Date(now.getFullYear(),now.getMonth()+1,0).getDate()-now.getDate();
  const isCurrent=currentYear===now.getFullYear()&&currentMonth===now.getMonth()+1;
  const alerts=[];

  if(isCurrent){
    data.budget.forEach(b=>{
      if(b.budget>0&&b.usage>100) alerts.push({t:'red',icon:'⚠️',title:`${b.name} 超支 ${fmtShort(b.actual-b.budget)}`,body:`已花 ${fmtShort(b.actual)}，预算 ${fmtShort(b.budget)}。剩余 ${daysLeft} 天建议控制。`});
      else if(b.budget>0&&b.usage>85){const r=b.budget-b.actual;alerts.push({t:'warn',icon:'👀',title:`${b.name} 快到上限`,body:`已用 ${b.usage}%，剩 ${fmtShort(r)}，还有 ${daysLeft} 天。`});}
    });
    if(data.monthly.savingsRate<0) alerts.push({t:'red',icon:'🚨',title:'本月支出超过收入',body:`储蓄率 ${data.monthly.savingsRate}%，本月在亏钱，需要减少支出。`});
    else if(data.monthly.savingsRate>=30) alerts.push({t:'tip',icon:'💰',title:'储蓄率表现良好',body:`储蓄率 ${data.monthly.savingsRate}%，继续保持！`});

    // 异常支出检测
    const avgAmount = data.monthly.expenses / Math.max(data.recentExpenses.length, 1);
    data.recentExpenses.forEach(t=>{
      if(t.amount > Math.max(500, avgAmount*5)) alerts.push({t:'warn',icon:'🔍',title:`异常大额支出：${t.name}`,body:`${fmtShort(t.amount)} 于 ${t.date}，远高于日常水平，请确认是否正确分类。`});
    });
  }

  const sec=document.getElementById('alertSection');
  if(!alerts.length){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('alertList').innerHTML=alerts.map(a=>`
    <div class="alert-card ${a.t==='tip'?'tip':a.t==='warn'?'warn':''}">
      <div class="alert-icon ${a.t==='tip'?'green':a.t==='warn'?'warn':'red'}">${a.icon}</div>
      <div><div class="alert-title">${a.title}</div><div class="alert-body">${a.body}</div></div>
    </div>`).join('');
}

// Charts
function mkChart(id,cfg){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),cfg);return charts[id];}

function renderIncExp(yd) {
  const labels=yd.months.map(m=>m.month);
  const income=yd.months.map(m=>m.income);
  const expenses=yd.months.map(m=>m.expenses);
  mkChart('incExpChart',{type:'bar',data:{labels,datasets:[
    {label:'收入',data:income,backgroundColor:'#C5A96A',borderRadius:4,borderSkipped:false},
    {label:'支出',data:expenses,backgroundColor:'#2A2A2A',borderRadius:4,borderSkipped:false}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'RM '+c.raw.toLocaleString()}}},scales:{
    x:{grid:{display:false},ticks:{color:'#BBB',font:{size:10}},border:{display:false}},
    y:{grid:{color:'#F0F0EE'},ticks:{color:'#BBB',font:{size:10},callback:v=>'RM '+(v/1000)+'k'},border:{display:false}}
  }}});
}

function renderDaily(daily, year, month) {
  const daysInMonth = new Date(year, month, 0).getDate();
  const labels=[], data=[];
  for(let d=1;d<=daysInMonth;d++){
    const key=`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    labels.push(d);
    data.push(daily[key]||0);
  }
  document.getElementById('dailyTitle').textContent=`${month}月每日支出`;
  const colors=data.map(v=>v>1000?'#E05C5C':v>500?'#E0A550':'#2A2A2A');
  mkChart('dailyChart',{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'RM '+c.raw.toLocaleString()}}},
    scales:{x:{grid:{display:false},ticks:{color:'#BBB',font:{size:9},maxTicksLimit:15},border:{display:false}},
    y:{grid:{color:'#F0F0EE'},ticks:{color:'#BBB',font:{size:9},callback:v=>v>0?'RM '+(v/1000).toFixed(1)+'k':''},border:{display:false}}}}});
}

const CAT_COLORS=['#C5A96A','#52C17A','#6B9EE8','#AA82D0','#E0A550','#E05C5C','#4ECDC4','#888'];
function renderDonut(budget, totalExp) {
  const cats=budget.filter(b=>b.actual>0);
  document.getElementById('donutTotal').textContent=fmtShort(totalExp);
  mkChart('donutChart',{type:'doughnut',data:{labels:cats.map(c=>c.name),datasets:[{data:cats.map(c=>c.actual),backgroundColor:CAT_COLORS.slice(0,cats.length),borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmtShort(c.raw)} (${Math.round(c.raw/totalExp*100)}%)`}}}}});
  document.getElementById('donutLegend').innerHTML=cats.map((c,i)=>`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px">
      <span style="display:flex;align-items:center;gap:6px;color:#666"><span style="width:8px;height:8px;border-radius:2px;background:${CAT_COLORS[i]};display:inline-block"></span>${c.name}</span>
      <span style="font-weight:600;color:#111">${Math.round(c.actual/totalExp*100)}%</span>
    </div>`).join('');
}

async function loadAll() {
  const ms=`${currentYear}-${String(currentMonth).padStart(2,'0')}`;
  document.getElementById('heroMonthLabel').textContent=`${currentYear}年${String(currentMonth).padStart(2,'0')}月`;
  document.getElementById('topbarSub').textContent=`${currentYear}年 ${currentMonth}月`;

  const res=await fetch(`/api/notion?action=dashboard&month=${ms}`);
  const data=await res.json();

  // KPI
  document.getElementById('heroIncome').textContent=fmtShort(data.monthly.income);
  document.getElementById('heroExpenses').textContent=fmtShort(data.monthly.expenses);
  const sr=data.monthly.savingsRate;
  const srEl=document.getElementById('heroSavings');
  srEl.textContent=sr+'%';
  srEl.className='kpi-val '+(sr>=20?'green':sr>=0?'gold':'red');

  // Health
  renderHealth(calcHealth(data));
  buildAlerts(data);

  // Budget
  document.getElementById('budgetList').innerHTML=data.budget.length
    ?data.budget.map(b=>{
      const cls=b.usage>100?'over':b.usage>85?'warn':'ok';
      const bc=b.usage>100?'badge-over':b.usage>85?'badge-warn':'badge-ok';
      const bt=b.usage>100?`超支 ${fmtShort(b.actual-b.budget)}`:`剩余 ${fmtShort(b.budget-b.actual)}`;
      return`<div class="budget-card"><div class="budget-top"><div class="budget-name">${b.name}</div><div class="badge ${bc}">${bt}</div></div>
        <div class="budget-amounts"><b>${fmtShort(b.actual)}</b> / ${fmtShort(b.budget)}</div>
        <div class="btrack"><div class="bfill ${cls}" style="width:${Math.min(b.usage,100)}%"></div></div>
        <div class="budget-remain">${b.usage>100?`已超出 <b>${b.usage-100}%</b>`:`已用 <b>${b.usage}%</b>`}</div></div>`;
    }).join(''):'<div class="loading-state">本月无预算数据</div>';

  // Debt + prediction
  document.getElementById('debtList').innerHTML=data.debt.length
    ?data.debt.map(d=>{
      const total=d.remaining+d.totalPaid;
      const pct=total>0?Math.round((d.totalPaid/total)*100):0;
      const months=d.monthlyPayment>0?Math.ceil(d.remaining/d.monthlyPayment):null;
      const payoffDate=months?new Date(new Date().setMonth(new Date().getMonth()+months)):null;
      const payoffStr=payoffDate?`${payoffDate.getFullYear()}年${payoffDate.getMonth()+1}月还清`:'未设还款额';
      return`<div class="debt-card"><div class="debt-name">${d.name}</div>
        <div class="debt-row">剩余 <span style="color:#E05C5C">${fmt2(d.remaining)}</span></div>
        <div class="debt-row">每月还款 <span>${fmtShort(d.monthlyPayment)}</span></div>
        <div class="debt-row">已还 <span>${fmt2(d.totalPaid)}</span></div>
        <div class="dtrack"><div class="dfill" style="width:${pct}%"></div></div>
        <div class="debt-predict">🎯 预计 ${payoffStr}${months?`（还需 ${months} 个月）`:''}</div></div>`;
    }).join(''):'<div class="loading-state">无债务记录</div>';

  // Recent
  const avgAmt=data.monthly.expenses/Math.max(data.recentExpenses.length,1);
  const catBg={'饮食 Food & Beverage':'#FEF0F0','交通 Transport':'#F0F4FE','娱乐 Entertainment':'#FFF0F8','订阅费用 Subscription Fees':'#F0F4FF'};
  const catIcon={'饮食 Food & Beverage':'🍜','交通 Transport':'🚗','娱乐 Entertainment':'🎉','订阅费用 Subscription Fees':'📱'};
  document.getElementById('recentList').innerHTML=data.recentExpenses.length
    ?data.recentExpenses.map(t=>{
      const icon=catIcon[t.category]||'💳';
      const bg=catBg[t.category]||'#F5F5F0';
      const anomaly=t.amount>Math.max(500,avgAmt*4);
      return`<div class="tx-item"><div class="tx-icon" style="background:${bg}">${icon}</div>
        <div><div class="tx-name">${t.name}${anomaly?'<span class="anomaly-badge">大额</span>':''}</div><div class="tx-meta">${t.date} · ${t.category||'其他'}</div></div>
        <div class="tx-amount">-${fmtShort(t.amount)}</div></div>`;
    }).join(''):'<div class="loading-state">本月无支出记录</div>';

  // Daily chart
  renderDaily(data.daily||{}, currentYear, currentMonth);

  // Donut
  if(data.budget.length) renderDonut(data.budget, data.monthly.expenses);

  // Yearly
  loadYearly();
}

async function loadYearly(){
  if(!yearlyCache[currentYear]){
    const r=await fetch(`/api/notion?action=yearly&year=${currentYear}`);
    yearlyCache[currentYear]=await r.json();
  }
  if(yearlyCache[currentYear]?.months) renderIncExp(yearlyCache[currentYear]);
}

updateYrBtns();
loadAll();
</script>
</body>
</html>
