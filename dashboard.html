<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>财务报告 · ZIQI CHONG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#EEEEE9;font-family:-apple-system,'PingFang SC',sans-serif;min-height:100vh}

.safe-wrap{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:#F5F5F0;
  position:relative;
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
}

.topbar{padding:calc(16px + env(safe-area-inset-top)) 20px 12px;display:flex;justify-content:space-between;align-items:center;background:#F5F5F0}
.topbar-name{font-size:13px;font-weight:600;color:#111;letter-spacing:0.05em}
.topbar-sub{font-size:11px;color:#999;margin-top:2px}
.notif{width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #E8E8E8;font-size:16px}

.hero-card{margin:0 20px;background:#111;border-radius:24px;padding:22px;color:#fff;position:relative;overflow:hidden}
.hero-card::after{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(197,169,106,0.12);border-radius:50%}
.hero-month-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mnav-btn{background:#1E1E1E;border:1px solid #2A2A2A;color:#666;width:28px;height:28px;border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.mnav-btn:hover{border-color:#C5A96A;color:#C5A96A}
.hero-month-label{font-size:15px;font-weight:600;color:#F0F0F0;flex:1}
.hero-year-btns{display:flex;gap:6px}
.yr-btn{background:#1E1E1E;border:1px solid #2A2A2A;color:#666;padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer;transition:all .2s}
.yr-btn.active{border-color:#C5A96A;color:#C5A96A}
.hero-label{font-size:11px;color:#666;margin-bottom:4px}
.hero-balance{font-size:34px;font-weight:700;letter-spacing:-1px;color:#F0F0F0}
.hero-balance span{font-size:18px;font-weight:400;color:#777;margin-right:3px}
.hero-row{display:flex;margin-top:16px;border-top:1px solid #1E1E1E;padding-top:14px}
.hero-mini{flex:1;padding-right:12px}
.hero-mini:not(:first-child){padding-left:12px;border-left:1px solid #1E1E1E}
.hero-mini-label{font-size:10px;color:#666;margin-bottom:3px;letter-spacing:0.05em}
.hero-mini-val{font-size:15px;font-weight:700;color:#F0F0F0}
.hero-mini-val.gold{color:#C5A96A}
.hero-mini-val.green{color:#52C17A}

.section{padding:16px 20px 0}
.sec-title{font-size:11px;font-weight:600;color:#AAA;letter-spacing:0.10em;text-transform:uppercase;margin-bottom:12px}

.alert-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;border-left:3px solid #E05C5C}
.alert-card.warn{border-left-color:#E0A550}
.alert-card.tip{border-left-color:#52C17A}
.alert-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.alert-icon.red{background:#FEEEEE}
.alert-icon.warn{background:#FEF5E7}
.alert-icon.green{background:#EEF9F2}
.alert-title{font-size:13px;font-weight:600;color:#111;margin-bottom:3px}
.alert-body{font-size:12px;color:#888;line-height:1.55}

.budget-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:8px}
.budget-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.budget-name{font-size:13px;font-weight:600;color:#111}
.badge{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.badge-ok{background:#EEF9F2;color:#2D9B5A}
.badge-warn{background:#FEF5E7;color:#B8760A}
.badge-over{background:#FEEEEE;color:#C0392B}
.budget-amounts{font-size:12px;color:#AAA;margin-bottom:8px}
.budget-amounts b{color:#111;font-size:14px}
.btrack{height:6px;background:#F0F0EE;border-radius:3px;overflow:hidden;margin-bottom:6px}
.bfill{height:100%;border-radius:3px}
.bfill.ok{background:#52C17A}
.bfill.warn{background:#E0A550}
.bfill.over{background:#E05C5C}
.budget-remain{font-size:11px;color:#BBB}
.budget-remain b{color:#555}

.debt-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:8px}
.debt-name{font-size:14px;font-weight:600;color:#111;margin-bottom:10px}
.debt-row{display:flex;justify-content:space-between;font-size:12px;color:#AAA;margin-bottom:5px}
.debt-row span{color:#555;font-weight:500}
.dtrack{height:4px;background:#F0F0EE;border-radius:2px;margin-top:10px;overflow:hidden}
.dfill{height:100%;border-radius:2px;background:#C5A96A}

.chart-card{background:#fff;border-radius:16px;padding:16px}
.chart-inner{position:relative;width:100%;height:130px}

.tx-item{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-name{font-size:14px;font-weight:500;color:#111}
.tx-meta{font-size:11px;color:#BBB;margin-top:2px}
.tx-amount{font-size:14px;font-weight:600;color:#E05C5C;margin-left:auto}

.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #EBEBEB;display:flex;padding:10px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#CCC;cursor:pointer;text-decoration:none}
.nav-item.active{color:#111}
.nav-icon{font-size:20px}

.loading-state{color:#CCC;font-size:13px;text-align:center;padding:24px}

/* Desktop */
@media(min-width:520px){
  body{display:block;padding:0;background:#EEEEE9}
  .safe-wrap{
    max-width:100%;
    border-radius:0;
    box-shadow:none;
    background:transparent;
    display:grid;
    grid-template-columns:400px 1fr;
    grid-template-areas:
      'topbar topbar'
      'left   right'
      'nav    nav';
    min-height:100vh;
    padding-bottom:0;
  }
  .topbar{
    grid-area:topbar;
    background:#fff;
    border-bottom:1px solid #E8E8E8;
    padding:16px 32px;
  }
  .left-col{grid-area:left;padding:24px 12px 100px 24px}
  .right-col{grid-area:right;padding:24px 24px 100px 12px}
  .hero-card{margin:0}
  .bottomnav{
    grid-area:nav;
    position:sticky;
    bottom:0;
    max-width:100%;
    left:0;
    transform:none;
    border-radius:0;
    border-top:1px solid #E8E8E8;
    padding:10px 32px;
    justify-content:flex-start;
    gap:32px;
    background:#fff;
  }
  .nav-item{flex:none;flex-direction:row;gap:8px;font-size:13px}
}
</style>
</head>
<body>
<div class="safe-wrap">

  <div class="topbar">
    <div>
      <div class="topbar-name">ZIQI CHONG</div>
      <div class="topbar-sub" id="topbarSub">加载中...</div>
    </div>
    <div class="notif">🔔</div>
  </div>

  <!-- 左栏 -->
  <div class="left-col">
    <div class="hero-card">
      <div class="hero-month-nav">
        <button class="mnav-btn" id="prevMonth">‹</button>
        <div class="hero-month-label" id="heroMonthLabel">--</div>
        <button class="mnav-btn" id="nextMonth">›</button>
        <div class="hero-year-btns">
          <button class="yr-btn" onclick="setYear(2025)">2025</button>
          <button class="yr-btn active" onclick="setYear(2026)">2026</button>
        </div>
      </div>
      <div class="hero-label">本月净收支</div>
      <div class="hero-balance"><span>RM</span><span id="heroNet">--</span></div>
      <div class="hero-row">
        <div class="hero-mini">
          <div class="hero-mini-label">收入</div>
          <div class="hero-mini-val gold" id="heroIncome">--</div>
        </div>
        <div class="hero-mini">
          <div class="hero-mini-label">支出</div>
          <div class="hero-mini-val" id="heroExpenses">--</div>
        </div>
        <div class="hero-mini">
          <div class="hero-mini-label">储蓄率</div>
          <div class="hero-mini-val green" id="heroSavings">--</div>
        </div>
      </div>
    </div>

    <div id="alertSection" style="display:none;margin-top:16px">
      <div class="sec-title">智能提醒</div>
      <div id="alertList"></div>
    </div>

    <div style="margin-top:16px">
      <div class="sec-title">最近支出</div>
      <div id="recentList"><div class="loading-state">加载中...</div></div>
    </div>
  </div>

  <!-- 右栏 -->
  <div class="right-col">
    <div style="margin-bottom:16px">
      <div class="sec-title">全年支出趋势</div>
      <div class="chart-card">
        <div class="chart-inner">
          <canvas id="trendChart" role="img" aria-label="Monthly expense trend">Loading...</canvas>
        </div>
      </div>
    </div>

    <div style="margin-bottom:16px">
      <div class="sec-title">预算执行</div>
      <div id="budgetList"><div class="loading-state">加载中...</div></div>
    </div>

    <div>
      <div class="sec-title">债务进度</div>
      <div id="debtList"><div class="loading-state">加载中...</div></div>
    </div>
  </div>

</div>

<div class="bottomnav">
  <a href="/record.html" class="nav-item">
    <div class="nav-icon">✏️</div>
    <div>记录</div>
  </a>
  <a href="/dashboard.html" class="nav-item active">
    <div class="nav-icon">📊</div>
    <div>报告</div>
  </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const fmt = n => 'RM ' + (n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtShort = n => 'RM ' + Math.round(n||0).toLocaleString('en-MY');

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let trendChartInstance = null;
let yearlyCache = {};

document.getElementById('prevMonth').onclick = () => {
  currentMonth--;
  if(currentMonth < 1){currentMonth=12;currentYear--;}
  updateYearBtns();
  loadAll();
};
document.getElementById('nextMonth').onclick = () => {
  const now = new Date();
  if(currentYear===now.getFullYear()&&currentMonth>=now.getMonth()+1) return;
  currentMonth++;
  if(currentMonth>12){currentMonth=1;currentYear++;}
  updateYearBtns();
  loadAll();
};

function setYear(y){
  currentYear=y;
  const now=new Date();
  currentMonth=y===now.getFullYear()?now.getMonth()+1:12;
  updateYearBtns();
  yearlyCache={};
  loadAll();
}

function updateYearBtns(){
  document.querySelectorAll('.yr-btn').forEach(b=>{
    b.classList.toggle('active',parseInt(b.textContent)===currentYear);
  });
}

function buildAlerts(data){
  const now=new Date();
  const daysLeft=new Date(now.getFullYear(),now.getMonth()+1,0).getDate()-now.getDate();
  const isCurrentMonth=currentYear===now.getFullYear()&&currentMonth===now.getMonth()+1;
  const alerts=[];

  if(isCurrentMonth){
    data.budget.forEach(b=>{
      if(b.budget>0&&b.usage>100){
        alerts.push({type:'red',icon:'⚠️',title:`${b.name} 已超支 ${fmtShort(b.actual-b.budget)}`,body:`本月花了 ${fmtShort(b.actual)}，预算 ${fmtShort(b.budget)}。剩余 ${daysLeft} 天，建议控制此类消费。`});
      } else if(b.budget>0&&b.usage>85){
        const remain=b.budget-b.actual;
        const perDay=daysLeft>0?Math.round(remain/daysLeft):0;
        alerts.push({type:'warn',icon:'👀',title:`${b.name} 快到预算上限`,body:`已花 ${fmtShort(b.actual)} / ${fmtShort(b.budget)}（${b.usage}%）。剩余 ${daysLeft} 天，每天只剩 ${fmtShort(perDay)}。`});
      }
    });
    if(data.monthly.savingsRate>=30){
      alerts.push({type:'tip',icon:'💰',title:'本月储蓄表现不错',body:`储蓄率 ${data.monthly.savingsRate}%，继续保持这个节奏！`});
    }
  }

  const sec=document.getElementById('alertSection');
  const list=document.getElementById('alertList');
  if(!alerts.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=alerts.map(a=>`
    <div class="alert-card ${a.type==='red'?'':a.type==='warn'?'warn':'tip'}">
      <div class="alert-icon ${a.type==='red'?'red':a.type==='warn'?'warn':'green'}">${a.icon}</div>
      <div><div class="alert-title">${a.title}</div><div class="alert-body">${a.body}</div></div>
    </div>`).join('');
}

async function loadAll(){
  const monthStr=`${currentYear}-${String(currentMonth).padStart(2,'0')}`;
  document.getElementById('heroMonthLabel').textContent=`${currentYear}年${String(currentMonth).padStart(2,'0')}月`;
  document.getElementById('topbarSub').textContent=`${currentYear}年 ${currentMonth}月`;

  const res=await fetch(`/api/notion?action=dashboard&month=${monthStr}`);
  const data=await res.json();

  const net=(data.monthly.income||0)-(data.monthly.expenses||0);
  document.getElementById('heroNet').textContent=Math.round(net).toLocaleString('en-MY');
  document.getElementById('heroIncome').textContent=fmtShort(data.monthly.income);
  document.getElementById('heroExpenses').textContent=fmtShort(data.monthly.expenses);
  document.getElementById('heroSavings').textContent=(data.monthly.savingsRate||0)+'%';

  buildAlerts(data);

  const catIcon={'🍜 饮食 Food':'🍜','🚗 交通 Transport':'🚗','🎉 娱乐 Entertainment':'🎉'};
  const catBg={'🍜 饮食 Food':'#FEF0F0','🚗 交通 Transport':'#F0F4FE','🎉 娱乐 Entertainment':'#FFF0F8'};

  document.getElementById('budgetList').innerHTML=data.budget.length
    ?data.budget.map(b=>{
      const cls=b.usage>100?'over':b.usage>85?'warn':'ok';
      const badgeCls=b.usage>100?'badge-over':b.usage>85?'badge-warn':'badge-ok';
      const badgeText=b.usage>100?`超支 ${fmtShort(b.actual-b.budget)}`:`剩余 ${fmtShort(b.budget-b.actual)}`;
      return`<div class="budget-card">
        <div class="budget-top"><div class="budget-name">${b.name}</div><div class="badge ${badgeCls}">${badgeText}</div></div>
        <div class="budget-amounts"><b>${fmtShort(b.actual)}</b> / ${fmtShort(b.budget)}</div>
        <div class="btrack"><div class="bfill ${cls}" style="width:${Math.min(b.usage,100)}%"></div></div>
        <div class="budget-remain">${b.usage>100?`已超出预算 <b>${b.usage-100}%</b>`:`已使用 <b>${b.usage}%</b>`}</div>
      </div>`;
    }).join('')
    :'<div class="loading-state">本月无预算数据</div>';

  document.getElementById('debtList').innerHTML=data.debt.length
    ?data.debt.map(d=>{
      const total=d.remaining+d.totalPaid;
      const pct=total>0?Math.round((d.totalPaid/total)*100):0;
      return`<div class="debt-card">
        <div class="debt-name">${d.name}</div>
        <div class="debt-row">剩余债务 <span style="color:#E05C5C">${fmt(d.remaining)}</span></div>
        <div class="debt-row">每月还款 <span>${fmt(d.monthlyPayment)}</span></div>
        <div class="dtrack"><div class="dfill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')
    :'<div class="loading-state">无债务记录</div>';

  document.getElementById('recentList').innerHTML=data.recentExpenses.length
    ?data.recentExpenses.map(t=>{
      const icon=catIcon[t.category]||'💳';
      const bg=catBg[t.category]||'#F5F5F0';
      return`<div class="tx-item">
        <div class="tx-icon" style="background:${bg}">${icon}</div>
        <div><div class="tx-name">${t.name}</div><div class="tx-meta">${t.date} · ${t.category||'其他'}</div></div>
        <div class="tx-amount">-${fmtShort(t.amount)}</div>
      </div>`;
    }).join('')
    :'<div class="loading-state">本月无支出记录</div>';

  loadYearly();
}

async function loadYearly(){
  if(!yearlyCache[currentYear]){
    const res=await fetch(`/api/notion?action=yearly&year=${currentYear}`);
    yearlyCache[currentYear]=await res.json();
  }
  const yd=yearlyCache[currentYear];
  if(!yd||!yd.months) return;
  const labels=yd.months.map(m=>m.month);
  const expenses=yd.months.map(m=>m.expenses);

  if(trendChartInstance) trendChartInstance.destroy();
  trendChartInstance=new Chart(document.getElementById('trendChart'),{
    type:'line',
    data:{
      labels,
      datasets:[{
        data:expenses,
        borderColor:'#111',borderWidth:2,
        pointBackgroundColor:expenses.map((_,i)=>i===currentMonth-1?'#C5A96A':'#111'),
        pointRadius:expenses.map((_,i)=>i===currentMonth-1?6:3),
        fill:true,backgroundColor:'rgba(17,17,17,0.04)',tension:0.4
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'RM '+c.raw.toLocaleString()}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#BBB',font:{size:11}},border:{display:false}},
        y:{grid:{color:'#F0F0EE'},ticks:{color:'#BBB',font:{size:10},callback:v=>'RM '+(v/1000)+'k'},border:{display:false}}
      }
    }
  });
}

loadAll();
</script>
</body>
</html>
