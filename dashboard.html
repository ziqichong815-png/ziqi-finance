<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>财务报告 · ZIQI CHONG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#EEEEE9;font-family:-apple-system,'PingFang SC',sans-serif;min-height:100vh}

.safe-wrap{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  background:#F5F5F0;
  position:relative;
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
}

@media(min-width:520px){
  body{display:flex;justify-content:center;align-items:flex-start;padding:24px 16px 24px}
  .safe-wrap{border-radius:28px;min-height:auto;box-shadow:0 8px 40px rgba(0,0,0,0.10);overflow:hidden}
}

.topbar{padding:calc(16px + env(safe-area-inset-top)) 20px 8px;display:flex;justify-content:space-between;align-items:center}
.topbar-name{font-size:13px;font-weight:600;color:#111;letter-spacing:0.05em}
.topbar-sub{font-size:11px;color:#999;margin-top:2px}
.notif{width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid #E8E8E8;font-size:16px;cursor:pointer}

.hero-card{margin:8px 20px 0;background:#111;border-radius:24px;padding:22px;color:#fff;position:relative;overflow:hidden}
.hero-card::after{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(197,169,106,0.12);border-radius:50%}
.hero-month-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.mnav-btn{background:#1E1E1E;border:1px solid #2A2A2A;color:#666;width:28px;height:28px;border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}
.mnav-btn:hover{border-color:#C5A96A;color:#C5A96A}
.hero-month-label{font-size:15px;font-weight:600;color:#F0F0F0;flex:1}
.hero-year-btns{display:flex;gap:6px}
.yr-btn{background:#1E1E1E;border:1px solid #2A2A2A;color:#666;padding:3px 10px;border-radius:12px;font-size:11px;cursor:pointer}
.yr-btn.active{border-color:#C5A96A;color:#C5A96A}
.hero-label{font-size:11px;color:#666;margin-bottom:4px}
.hero-balance{font-size:34px;font-weight:700;letter-spacing:-1px;color:#F0F0F0}
.hero-balance span{font-size:18px;font-weight:400;color:#777;margin-right:3px}
.hero-row{display:flex;gap:0;margin-top:16px;border-top:1px solid #1E1E1E;padding-top:14px}
.hero-mini{flex:1;padding-right:12px}
.hero-mini:not(:first-child){padding-left:12px;border-left:1px solid #1E1E1E}
.hero-mini-label{font-size:10px;color:#666;margin-bottom:3px;letter-spacing:0.05em}
.hero-mini-val{font-size:15px;font-weight:700}
.hero-mini-val.gold{color:#C5A96A}
.hero-mini-val.green{color:#52C17A}

.section{padding:16px 20px 0}
.sec-title{font-size:11px;font-weight:600;color:#AAA;letter-spacing:0.10em;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.sec-more{font-size:11px;color:#C5A96A;font-weight:500;letter-spacing:0;text-transform:none}

.alert-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;border-left:3px solid #E05C5C}
.alert-card.warn{border-left-color:#E0A550}
.alert-card.tip{border-left-color:#52C17A}
.alert-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.alert-icon.red{background:#FEEEEE}
.alert-icon.warn{background:#FEF5E7}
.alert-icon.green{background:#EEF9F2}
.alert-title{font-size:13px;font-weight:600;color:#111;margin-bottom:3px}
.alert-body{font-size:12px;color:#888;line-height:1.55}

.budget-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:8px}
.budget-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.budget-name{font-size:13px;font-weight:600;color:#111}
.badge{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.badge-ok{background:#EEF9F2;color:#2D9B5A}
.badge-warn{background:#FEF5E7;color:#B8760A}
.badge-over{background:#FEEEEE;color:#C0392B}
.budget-amounts{font-size:12px;color:#AAA;margin-bottom:8px}
.budget-amounts b{color:#111;font-size:14px}
.btrack{height:6px;background:#F0F0EE;border-radius:3px;overflow:hidden;margin-bottom:6px}
.bfill{height:100%;border-radius:3px}
.bfill.ok{background:#52C17A}
.bfill.warn{background:#E0A550}
.bfill.over{background:#E05C5C}
.budget-remain{font-size:11px;color:#BBB}
.budget-remain b{color:#555}
